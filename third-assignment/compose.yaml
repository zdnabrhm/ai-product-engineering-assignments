services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: third_assignment
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
