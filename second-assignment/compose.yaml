services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aiworkout
      POSTGRES_USER: aiworkout
      POSTGRES_PASSWORD: aiworkout
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiworkout -d aiworkout"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
